<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación en Progreso - Test Espacial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-premium px-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold text-white tracking-wide">🧠 SISTEMA BFA</span>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-white opacity-75 me-3 id="nombreEstudiante"">Estudiante: 001</span>
            <div class="timer-box" id="timer">05:00</div>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card main-card p-4 p-md-5">

                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                    <div>
                        <h5 class="text-secondary fw-light mb-1">Módulo Psicotécnico</h5>
                        <h3 class="fw-bold text-dark m-0">Visualización de Ladrillos y Cubos</h3>
                    </div>
                    <span class="badge bg-light text-primary border px-3 py-2 fs-6 rounded-pill" id="infoProgreso">Pregunta 1 de 2</span>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="img-container shadow-sm h-100">
                            <img id="imagenReactivo" src="https://via.placeholder.com/400x300?text=Reactivo+Cubo" class="img-fluid img-reactivo" alt="Reactivo Psicométrico">
                        </div>
                    </div>

                    <div class="col-md-6 d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="fw-semibold text-dark mb-4 lh-base" id="enunciadoPregunta">
                                ¿Cuántos lados del bloque marcado tocan directamente a otros bloques adyacentes?
                            </h5>

                            <div class="d-flex flex-column gap-3">
                                <button class="opcion-card text-start" data-opcion="A" id="btnA">A) 2 bloques</button>
                                <button class="opcion-card text-start" data-opcion="B" id="btnB">B) 4 bloques</button>
                                <button class="opcion-card text-start" data-opcion="C" id="btnC">C) 3 bloques</button>
                                <button class="opcion-card text-start" data-opcion="D" id="btnD">D) 5 bloques</button>
                            </div>
                        </div>

                        <div class="text-end mt-4">
                            <button class="btn btn-action shadow" id="btnSiguiente" disabled>Siguiente Pregunta →</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // Lógica interactiva idéntica a la anterior, integrada a las nuevas clases CSS elegantes.
    const preguntasFalsas = [
        { id: 1, enunciado: "¿Cuántos lados del bloque marcado tocan a otros bloques?", opcionA: "2 bloques", opcionB: "4 bloques", opcionC: "3 bloques", opcionD: "5 bloques", correcta: "C", img: "https://via.placeholder.com/400x300?text=Cubo+Ejemplo+1" },
        { id: 2, enunciado: "Identifique el patrón de ladrillos ocultos desde la vista superior.", opcionA: "Patrón A", opcionB: "Patrón B", opcionC: "Patrón C", opcionD: "Patrón D", correcta: "A", img: "https://via.placeholder.com/400x300?text=Cubo+Ejemplo+2" }
    ];

    let indiceActual = 0;
    let respuestasUsuario = [];
    let seleccionActual = null;
    let tiempoRestante = 300;

    const timerElement = document.getElementById('timer');
    const interval = setInterval(() => {
        let minutos = Math.floor(tiempoRestante / 60);
        let segundos = tiempoRestante % 60;
        timerElement.innerText = `${minutos < 10 ? '0' : ''}${minutos}:${segundos < 10 ? '0' : ''}${segundos}`;
        if (tiempoRestante <= 0) { clearInterval(interval); finalizarTest(); }
        tiempoRestante--;
    }, 1000);

    function cargarPregunta() {
        if(indiceActual >= preguntasFalsas.length) { clearInterval(interval); finalizarTest(); return; }
        const p = preguntasFalsas[indiceActual];
        document.getElementById('infoProgreso').innerText = `Pregunta ${indiceActual + 1} de ${preguntasFalsas.length}`;
        document.getElementById('enunciadoPregunta').innerText = p.enunciado;
        document.getElementById('imagenReactivo').src = p.img;
        document.getElementById('btnA').innerText = `A) ${p.opcionA}`;
        document.getElementById('btnB').innerText = `B) ${p.opcionB}`;
        document.getElementById('btnC').innerText = `C) ${p.opcionC}`;
        document.getElementById('btnD').innerText = `D) ${p.opcionD}`;

        document.querySelectorAll('.opcion-card').forEach(b => b.classList.remove('selected'));
        document.getElementById('btnSiguiente').disabled = true;
        seleccionActual = null;
    }

    document.querySelectorAll('.opcion-card').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.opcion-card').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            seleccionActual = this.getAttribute('data-opcion');
            document.getElementById('btnSiguiente').disabled = false;
        });
    });

    document.getElementById('btnSiguiente').addEventListener('click', () => {
        respuestasUsuario.push(seleccionActual);
        indiceActual++;
        cargarPregunta();
    });

    function finalizarTest() {
        Swal.fire({
            icon: 'success',
            title: '¡Prueba Completada!',
            text: 'Tus respuestas han sido registradas de forma segura.',
            background: '#1e272e',
            color: '#fff',
            confirmButtonColor: '#00c6ff',
            allowOutsideClick: false
        }).then(() => {
            alert("Simulación terminada. Respuestas recopiladas: " + respuestasUsuario.join(', '));
        });
    }

    cargarPregunta();
</script>
</body>
</html>
