<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Evaluación - Test Espacial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🧩 Test Espacial BFA</span>
        <div id="userInfo" class="badge bg-primary fs-6">Cargando Estudiante...</div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-4 text-secondary">Pregunta de Selección Única</h3>
                <p class="lead mb-4">Analice la figura espacial presentada y seleccione la opción correcta que corresponde a la vista armada.</p>

                <div class="mb-4 d-grid gap-2">
                    <button class="btn btn-outline-secondary text-start p-3 opcion-btn" onclick="seleccionar('A')">Opción A</button>
                    <button class="btn btn-outline-secondary text-start p-3 opcion-btn" onclick="seleccionar('B')">Opción B</button>
                    <button class="btn btn-outline-secondary text-start p-3 opcion-btn" onclick="seleccionar('C')">Opción C</button>
                    <button class="btn btn-outline-secondary text-start p-3 opcion-btn" onclick="seleccionar('D')">Opción D</button>
                </div>

                <button class="btn btn-primary btn-lg w-100" onclick="enviarExamen()">Finalizar y Enviar Evaluación</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // Obtener parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const cedula = urlParams.get('cedula');
    let respuesta = '';

    if(cedula) {
        document.getElementById('userInfo').innerText = "Cédula: " + cedula;
    } else {
        window.location.href = 'index.html';
    }

    function seleccionar(val) {
        document.querySelectorAll('.opcion-btn').forEach(b => b.classList.remove('active', 'btn-primary'));
        event.target.classList.add('active', 'btn-primary');
        respuesta = val;
    }

    function enviarExamen() {
        if(!respuesta) { Swal.fire('Atención', 'Selecciona una respuesta.', 'warning'); return; }

        const params = new URLSearchParams();
        params.append('action', 'procesar-respuestas');
        params.append('cedula', cedula);
        params.append('respuestas', respuesta);

        fetch('verificar-estudiante', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    Swal.fire('¡Test Finalizado!', 'Tu evaluación ha sido guardada en la base de datos.', 'success')
                        .then(() => { window.location.href = 'index.html'; });
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            });
    }
</script>
</body>
</html>
