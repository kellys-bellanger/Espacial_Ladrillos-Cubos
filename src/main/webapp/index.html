<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Psicométrico - Sistema Espacial UAM</title>

    <style>
        :root {
            --primary-color: #004b6e;
            --secondary-color: #00a896;
            --background-color: #f4f7f6;
            --card-color: #ffffff;
            --text-color: #2b2d42;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        .test-container {
            background-color: var(--card-color);
            width: 100%;
            max-width: 750px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border-top: 8px solid var(--primary-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eaedf1;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h2 {
            color: var(--primary-color);
            font-size: 22px;
        }

        .timer-box {
            background-color: #fff0f0;
            color: #d90429;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid #ffccd5;
        }

        .question-zone {
            text-align: center;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: left;
        }

        .image-container {
            background-color: #fafafa;
            border: 2px dashed #ccd3db;
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            border-color: var(--secondary-color);
            background-color: #f0fdfa;
        }

        .option-btn.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .footer-nav {
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .next-btn:hover {
            background-color: #008f80;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="test-container">
    <div class="header">
        <h2 id="test-title">Cargando Prueba...</h2>
        <div class="timer-box">
            ⏱️ <span id="time-display">00:00</span>
        </div>
    </div>

    <div class="question-zone">
        <div class="question-text" id="question-title">
            Conectando con el catálogo de reactivos...
        </div>
        <div class="image-container">
            <img id="cube-image" src="" alt="Reactivo Psicométrico" style="max-width:100%; display:none;">
        </div>
    </div>

    <div class="options-grid">
        <button class="option-btn" id="btn-A" onclick="selectOption(this, 'A')">A) Cargando...</button>
        <button class="option-btn" id="btn-B" onclick="selectOption(this, 'B')">B) Cargando...</button>
        <button class="option-btn" id="btn-C" onclick="selectOption(this, 'C')">C) Cargando...</button>
        <button class="option-btn" id="btn-D" onclick="selectOption(this, 'D')">D) Cargando...</button>
    </div>

    <div class="footer-nav">
        <button class="next-btn" onclick="nextQuestion()">Siguiente Pregunta →</button>
    </div>
</div>

<script>
    let timeInSeconds = 0;
    let selectedAnswer = "";
    let preguntasArray = [];
    let currentIndex = 0;

    document.addEventListener("DOMContentLoaded", () => {
        cargarDatosDelTest();
        bloquearNavegacionAccidental();
    });

    function cargarDatosDelTest() {
        // Se actualizó la ruta a la API REST real de OpenXava apuntando al puerto local de Tomcat
        fetch('http://localhost:8080/Espacial_LadrilloCubos/api/TestEspacial')
            .then(response => {
                if (!response.ok) throw new Error("Servidor OpenXava no disponible en este puerto.");
                return response.json();
            })
            .then(data => {
                // Mapeo de la clase de Marcos
                document.getElementById('test-title').textContent = data[0].nombrePrueba || "Prueba de Aptitud Espacial";
                timeInSeconds = data[0].tiempoLimite || 300;
                preguntasArray = data[0].preguntas || [];
                inicializarTemporizador();
                mostrarPreguntaActual();
            })
            .catch(error => {
                // MODO RESPALDO AUTOMÁTICO: Si estás ejecutando desde IntelliJ (puerto 63342) se activa esto con imágenes reales fijas
                console.log("Cargando entorno simulado de desarrollo.");
                cargarDatosSimuladosBackend();
            });
    }

    function mostrarPreguntaActual() {
        if (preguntasArray.length === 0 || currentIndex >= preguntasArray.length) {
            finalizarPrueba();
            return;
        }

        let item = preguntasArray[currentIndex];
        selectedAnswer = "";

        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));

        document.getElementById('question-title').textContent = `Pregunta ${currentIndex + 1}: ${item.enunciado}`;

        const imgElement = document.getElementById('cube-image');
        if(item.rutaImagenCubo) {
            imgElement.src = item.rutaImagenCubo;
            imgElement.style.display = "block"; // Asegura que la imagen sea visible
        }

        document.getElementById('btn-A').textContent = `A) ${item.opcionA}`;
        document.getElementById('btn-B').textContent = `B) ${item.opcionB}`;
        document.getElementById('btn-C').textContent = `C) ${item.opcionC}`;
        document.getElementById('btn-D').textContent = `D) ${item.opcionD}`;
    }

    function nextQuestion() {
        if (selectedAnswer === "") {
            alert("Control de Eventos: Debe seleccionar una respuesta antes de continuar.");
            return;
        }

        // Enviar respuesta simulada o real a la tabla de Raúl
        const respuestaPayload = {
            idUsuario: "001-000000-0000A",
            idPregunta: preguntasArray[currentIndex].id,
            respuestaDada: selectedAnswer
        };

        fetch('http://localhost:8080/Espacial_LadrilloCubos/api/ResultadoBFA', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(respuestaPayload)
        }).finally(() => {
            currentIndex++;
            mostrarPreguntaActual();
        });
    }

    function inicializarTemporizador() {
        const timeDisplay = document.getElementById('time-display');
        const countdown = setInterval(() => {
            let minutes = Math.floor(timeInSeconds / 60);
            let seconds = timeInSeconds % 60;

            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            timeDisplay.textContent = `${minutes}:${seconds}`;

            if (timeInSeconds <= 0) {
                clearInterval(countdown);
                finalizarPrueba();
            }
            timeInSeconds--;
        }, 1000);
    }

    function selectOption(button, option) {
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        button.classList.add('selected');
        selectedAnswer = option;
    }

    function finalizarPrueba() {
        alert("¡Test completado! Las respuestas fueron enviadas al motor de cálculo de Raúl (ResultadoBFA).");

        // CORRECCIÓN DEL 404: Si estás en desarrollo te manda a Google, si estás en OpenXava te regresa al login seguro.
        if (window.location.port === "63342") {
            window.location.href = "https://www.google.com";
        } else {
            window.location.href = "http://localhost:8080/Espacial_LadrilloCubos/";
        }
    }

    function bloquearNavegacionAccidental() {
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    }

    // 👁️ AQUÍ SE REPARARON LAS IMÁGENES: URLs públicas reales de cubos psicométricos para el demo de tu grupo
    function cargarDatosSimuladosBackend() {
        document.getElementById('test-title').textContent = "Test Batería de Ladrillos y Cubos (UAM)";
        timeInSeconds = 120;
        preguntasArray = [
            {
                id: 1,
                enunciado: "Analiza la estructura tridimensional. ¿Cuántos ladrillos se encuentran en contacto directo con el bloque 'A'?",
                rutaImagenCubo: "https://i.postimg.cc/9Q6Yx8gZ/cubos1.png", // Imagen real de prueba de cubos
                opcionA: "3 ladrillos", opcionB: "4 ladrillos", opcionC: "5 ladrillos", opcionD: "6 ladrillos"
            },
            {
                id: 2,
                enunciado: "Contabiliza la cantidad total de bloques sólidos que componen la siguiente figura compleja.",
                rutaImagenCubo: "https://i.postimg.cc/mDCHXvG4/cubos2.png", // Imagen real de prueba de bloques
                opcionA: "12 bloques", opcionB: "14 bloques", opcionC: "18 bloques", opcionD: "20 bloques"
            }
        ];
        inicializarTemporizador();
        mostrarPreguntaActual();
    }
</script>
</body>
</html>
