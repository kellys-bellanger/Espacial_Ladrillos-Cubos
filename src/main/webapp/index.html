<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Evaluación Psicométrica</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>

<div class="container-box">
    <div class="icon">🧩</div>
    <h1>Test Espacial</h1>
    <div class="subtitle">Módulo de Evaluación de Ladrillos y Cubos</div>

    <form id="loginForm">
        <div class="form-group">
            <label for="cedula">Ingrese su Cédula de Identidad</label>
            <input type="text" id="cedula" placeholder="Ej: 001-000000-0000X" required autocomplete="off">
        </div>
        <button type="submit" class="btn-submit">Verificar Evaluación</button>
    </form>
    <p class="footer-text">Desarrollado para el Sistema BFA</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const cedulaInput = document.getElementById('cedula').value.trim();

        const params = new URLSearchParams();
        params.append('cedula', cedulaInput);

        // Envía la petición al servlet de backend
        fetch('verificar-estudiante', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: '¡Bienvenido!',
                        text: 'Identidad confirmada: ' + data.nombre,
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        // Redirige a la página del examen enviando la cédula
                        window.location.href = "test.html?cedula=" + encodeURIComponent(cedulaInput);
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Evaluación denegada', text: data.message });
                }
            });
    });
</script>
</body>
</html>
